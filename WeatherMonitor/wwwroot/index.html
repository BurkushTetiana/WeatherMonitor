<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Weather Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dygraph/2.1.0/dygraph.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dygraph/2.1.0/dygraph.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            background-color: #2b2b2b;
            color: #efefef;
        }

        h1, h3 {
            font-weight: 500;
        }

        #graph {
            width: 800px;
            height: 300px;
            background: #333333;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444444;
            margin-top: 15px;
        }

        .card {
            display: inline-block;
            padding: 15px 25px;
            margin: 10px 15px 20px 0;
            border-radius: 8px;
            background: #3a3a3a;
            font-size: 1.3em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #454545;
        }

            .card b {
                color: #4ea8de;
            }
    </style>
</head>
<body>
    <h1>🌤 Weather Monitor</h1>

    <div>
        <div class="card">🌡 Температура: <b id="temp">—</b> °C</div>
        <div class="card">💧 Вологість: <b id="hum">—</b> %</div>
        <div class="card">🔵 Тиск: <b id="press">—</b> hPa</div>
    </div>

    <h3>Графік температури</h3>
    <div id="graph"></div>

    <script>
        const API = 'https://localhost:44386/weather';
        let graphData = [];
        let g = null;

        async function fetchData() {
            try {
                const res = await fetch(API);
                const data = await res.json();

                if (!data || !data.length) return;

                // 1. Сортуємо ВСІ отримані дані за часом від найдавніших до найновіших
                const sortedData = data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                // 2. Оновлення поточних карток (беремо найостанніший запис у відсортованому масиві)
                const latest = sortedData[sortedData.length - 1];
                document.getElementById('temp').textContent = latest.temperature.toFixed(1);
                document.getElementById('hum').textContent = latest.humidity.toFixed(1);
                document.getElementById('press').textContent = latest.pressure.toFixed(1);

                // 3. Беремо останні 60 записів для плавного відображення графіка за хвилину
                const slice = sortedData.slice(-60);
                graphData = slice.map(r => [new Date(r.timestamp), r.temperature]);

                // 4. Малюємо або оновлюємо графік
                if (!g) {
                    g = new Dygraph(document.getElementById('graph'), graphData, {
                        labels: ['Час', 'Температура (°C)'],
                        strokeWidth: 2,
                        colors: ['#ff6b6b'],
                        gridLineColor: '#444444',
                        axisLabelColor: '#bbbbbb'
                    });
                } else {
                    g.updateOptions({ file: graphData });
                }
            } catch (error) {
                console.error("Помилка завантаження даних погоди:", error);
            }
        }

        // Перший запуск та встановлення щосекундного таймера
        fetchData();
        setInterval(fetchData, 1000);
    </script>
</body>
</html>
